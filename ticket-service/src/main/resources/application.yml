server:
  port: 8082

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:mysql://localhost:3306/aiticket?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: aiticket
    password: aiticket
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# File upload
file:
  upload-dir: ./uploads

# AI Service (for Feign)
ai-service:
  url: http://localhost:8083

# Logging
logging:
  level:
    com.aiticket: DEBUG
