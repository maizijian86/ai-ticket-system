server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
        - id: ticket-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/tickets,/api/v1/tickets/**
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/ai/**

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: aiticket-jwt-secret-key-change-in-production-min-256-bits

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
